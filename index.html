<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gravity Simulator</title>
  <!-- Use a modern Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>

<body>
  <!-- Background / Canvas -->
  <canvas id="simulationCanvas"></canvas>

  <!-- UI Overlay -->
  <div id="uiPanel" class="glass-panel">
    <h1>Gravity Simulator</h1>
    <p class="subtitle">Explore orbital mechanics</p>

    <div class="control-group">
      <label>Mode:</label>
      <div class="toggle-group">
        <button id="btnPlanet" class="active">Planet</button>
        <button id="btnComet">Comet</button>
        <button id="btnEdit">Edit</button>
      </div>
    </div>

    <div class="control-group" id="massControlGroup">
      <label for="massInput">Planet Mass: <span id="massValue">1000</span></label>
      <input type="range" id="massInput" min="100" max="5000" value="1000" step="100">
      <label for="radiusInput" style="margin-top: 8px;">Planet Size: <span id="radiusValue">30</span></label>
      <input type="range" id="radiusInput" min="5" max="150" value="30" step="1">
    </div>

    <div class="control-actions">
      <button id="btnToggleOrbits" class="action-btn">Hide Orbits</button>
      <button id="btnClear" class="action-btn danger">Clear Space</button>
    </div>
    <div class="control-group" id="cometControlGroup"
      style="display: none; margin-top: 10px; flex-direction: column; gap: 8px;">
      <div style="display: flex; align-items: center; gap: 8px;">
        <input type="checkbox" id="chkPermanentOrbits"
          style="width: auto; cursor: pointer; accent-color: #4ecca3; transform: scale(1.2);">
        <label for="chkPermanentOrbits" style="margin: 0; cursor: pointer;">Permanent Orbits</label>
      </div>
      <div style="display: flex; align-items: center; gap: 8px;">
        <input type="checkbox" id="chkCollisions" checked
          style="width: auto; cursor: pointer; accent-color: #fc5185; transform: scale(1.2);">
        <label for="chkCollisions" style="margin: 0; cursor: pointer;">Enable Collisions</label>
      </div>
    </div>
    <div class="control-actions" id="editActions" style="display: none; margin-top: 10px;">
      <button id="btnDelete" class="action-btn danger">Delete Selected</button>
    </div>

    <div class="instructions" id="instructionText">
      Click anywhere to place a Planet.
    </div>
  </div>

  <!-- Scripts -->
  <script type="module" src="./main.js"></script>
</body>

</html>
